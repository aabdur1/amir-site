[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Allow the Image CDN to fetch gallery sources from CloudFront (next/image
# remotePatterns should map this automatically; explicit allowlist is the
# documented safety net — a miss here breaks images only in production)
[images]
  remote_images = ["https://d36t8s1mzbufg5.cloudfront.net/.*"]

[[redirects]]
  from = "https://amirabdurrahim.dev/*"
  to = "https://amirabdurrahim.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.amirabdurrahim.dev/*"
  to = "https://amirabdurrahim.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-FzZqltVqNEMe1AP7MNJyYU92WT6Smm3z6p9+mEkOLu0='; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https://d36t8s1mzbufg5.cloudfront.net https://images.credly.com; connect-src 'self' https://www.credly.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/badges/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sql-wasm.wasm"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
