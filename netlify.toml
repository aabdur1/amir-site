[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Allow the Image CDN to fetch gallery sources from CloudFront (next/image
# remotePatterns should map this automatically; explicit allowlist is the
# documented safety net — a miss here breaks images only in production)
[images]
  remote_images = ["https://d36t8s1mzbufg5.cloudfront.net/.*"]

[[redirects]]
  from = "https://amirabdurrahim.dev/*"
  to = "https://amirabdurrahim.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.amirabdurrahim.dev/*"
  to = "https://amirabdurrahim.com/:splat"
  status = 301
  force = true

# Applies to STATIC-ASSET responses only — Netlify ignores toml headers on
# responses served by the Next.js runtime function (i.e. every page). The
# document-level security headers (CSP, X-Frame-Options, Referrer-Policy,
# Permissions-Policy, HSTS) live in next.config.ts headers().
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/badges/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sql-wasm.wasm"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# webR runtime is version-keyed (/webr/0.6.0/) so immutable is safe; the
# package mirror path is not versioned, so it gets the sql-wasm treatment.
[[headers]]
  for = "/webr/0.6.0/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/webr/repo/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
